spring:
  application:
    name: safeops

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=10m

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500
        keep-alive: 60s
    scheduling:
      pool:
        size: 10

server:
  port: 8080
  servlet:
    context-path: /
    # Request size limits
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
      file-size-threshold: 2KB
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  
  # Tomcat specific settings
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB

# Management & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,5s

# Application Configuration
app:
  jwt:
    access-secret: ${APP_JWT_ACCESS_SECRET}
    refresh-secret: ${APP_JWT_REFRESH_SECRET}
    access-expiration-ms: 900000        # 15 minutes
    refresh-expiration-ms: 1209600000   # 14 days
  
  api:
    server-url: ${APP_API_SERVER_URL:}  # Optional: Configure for Swagger/OpenAPI
    server-description: ${APP_API_SERVER_DESCRIPTION:Production Server}
  
  security:
    validation:
      max-request-size: 10485760        # 10MB in bytes
      max-string-length: 10000          # Maximum string field length
      max-collection-size: 1000         # Maximum array/collection size
      max-nesting-depth: 20             # Maximum JSON nesting depth
      enable-xss-sanitization: true     # Enable XSS protection
      enable-sql-injection-check: true  # Enable SQL injection detection
      enable-command-injection-check: true  # Enable command injection detection

  audit:
    enabled: true
    async: true
    batch-size: 100
    retention-days: 365

  rate-limiting:
    enabled: true
    auth-limit: 10
    general-limit: 100
    heavy-limit: 10
    public-limit: 60

# Logging
logging:
  level:
    com.zama.safeops: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
    resolve-schema-properties: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    disable-swagger-default-url: true
  cache:
    disabled: true
  show-actuator: false
  packages-to-scan: com.zama.safeops.modules
  paths-to-match: /api/**, /health
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  writer-with-default-pretty-printer: true
  # Disable the customizer bean to avoid conflicts
  customizer:
    enabled: false
  # Remove these properties to avoid schema resolution issues
  remove-broken-reference-definitions: true
  # More lenient schema resolution
  override-with-generic-response: false
  # Skip types that can't be resolved
  default-flat-param-object: true
