# Test configuration
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///safeops_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/test-data
    clean-disabled: false

  # Disable unnecessary services in tests
  mail:
    host: localhost
    port: 3025

# Logging
logging:
  level:
    com.zama.safeops: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# JWT Configuration for tests
app:
  jwt:
    access-secret: test-access-secret-key-at-least-256-bits-long-for-hs512-algorithm
    refresh-secret: test-refresh-secret-key-at-least-256-bits-long-for-hs512-algorithm
    access-expiration-ms: 900000  # 15 minutes
    refresh-expiration-ms: 1209600000  # 14 days

  # Disable caching in tests for predictable behavior
  cache:
    type: none
